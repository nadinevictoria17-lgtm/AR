<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Science Explorer – Login</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet">

<!-- Font Awesome 6 -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-... (truncated) ..."
      crossorigin="anonymous" referrerpolicy="no-referrer"/>

<style>
/* ────── ROOT VARIABLES (DARK – default) ────── */
:root{
  --bg:        #0e1530;
  --card:      #1a2550;
  --accent:    #00e5c8;
  --text:      #eef0fb;
  --muted:     #8d94c8;
  --role-bg:   #141d44;
}

/* ────── LIGHT‑MODE OVERRIDES ────── */
html.light{
  --bg:        #f6f9ff;
  --card:      #ffffff;
  --accent:    #00e5c8;
  --text:      #212529;
  --muted:     #6c757d;
  --role-bg:   rgba(0,0,0,.07);
}

/* ────── GLOBAL RESET ────── */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  transition:background .3s ease, color .3s ease;
}

/* ────── CARD ────── */
.card{
  width:380px;
  padding:2rem;
  border-radius:22px;
  background:linear-gradient(160deg,var(--card),#0f1535);
  box-shadow:0 25px 60px rgba(0,0,0,.6);
  text-align:center;
  position:relative;
}

/* ────── MODE‑TOGGLE BUTTON ────── */
.mode-btn{
  position:absolute;
  top:1rem; right:1rem;
  width:38px;height:38px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.1);
  color:var(--text);
  cursor:pointer;
  font-size:1.1rem;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.2s;
}
.mode-btn:hover{background:rgba(255,255,255,.2);}

/* ────── ATOM LOGO ────── */
.atom-logo{
  position:relative;
  width:120px;height:120px;
  margin:0 auto 1rem;
}
.atom-logo .nucleus{
  position:absolute;
  inset:50%;
  width:38px;height:38px;
  margin:-19px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#00ffe0,#0060c0);
  box-shadow:0 0 20px var(--accent),0 0 50px rgba(0,229,200,.4);
  z-index:5;
}
.atom-logo .orbit{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:1.5px solid;
}
.atom-logo .orbit:nth-child(2){width:100px;height:40px;margin:auto;border-color:rgba(0,229,200,.55);animation:orbit 3s linear infinite;}
.atom-logo .orbit:nth-child(3){width:100px;height:40px;margin:auto;border-color:rgba(124,107,232,.5);animation:orbit 3.4s linear infinite reverse;}
.atom-logo .orbit:nth-child(4){width:100px;height:40px;margin:auto;border-color:rgba(255,209,102,.45);animation:orbit 4s linear infinite;}
.atom-logo .dot{
  position:absolute;
  top:-5px; left:50%;
  width:10px;height:10px;
  margin-left:-5px;
  border-radius:50%;
}
.atom-logo .orbit:nth-child(2) .dot{background:var(--accent);}
.atom-logo .orbit:nth-child(3) .dot{background:#7c6be8;}
.atom-logo .orbit:nth-child(4) .dot{background:#ffd166;}

/* ────── TEXT ────── */
.logo-text{
  font-family:'Orbitron',monospace;
  font-size:1.5rem;
  color:var(--accent);
  margin-top:.4rem;
}
.subtitle{
  font-size:.9rem;
  color:var(--muted);
  margin:.8rem 0 1.6rem;
}

/* ────── ROLE BUTTONS ────── */
.role-row{
  display:flex;
  gap:10px;
  margin-bottom:1.2rem;
}
.role-btn{
  flex:1;
  padding:.6rem;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.1);
  background:var(--role-bg);
  color:var(--text);
  font-weight:700;
  cursor:pointer;
}
.role-btn.active{
  border-color:var(--accent);
  color:#0a1020;
  background:var(--accent);
}

/* ────── INPUT FIELDS ────── */
.input-group{
  position:relative;
  margin-bottom:1rem;
}
input{
  width:100%;
  padding:1rem 1rem .9rem 3rem;
  border-radius:10px;
  border:none;
  background:transparent;
  color:var(--text);
  font-weight:600;
}
input::placeholder{color:var(--muted);}
.input-group .fa{
  position:absolute;
  left:1rem;
  top:50%;
  transform:translateY(-50%);
  color:#aaa;
}

/* ────── SHOW/HIDE PASSWORD ICON ────── */
.icon{
  position:absolute;
  right:1rem;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:var(--muted);
}

/* ────── ERRORS ────── */
.error{
  font-size:.75rem;
  color:#ff7c7c;
  margin-top:-.4rem;
  margin-bottom:.6rem;
  display:none;
}

/* ────── LOGIN BUTTON ────── */
.login-btn{
  width:100%;
  padding:1rem;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--accent),#0090d0);
  font-weight:900;
  font-family:'Orbitron',monospace;
  cursor:pointer;
  color:#0a1020;
}

/* ────── LINKS ────── */
.links{
  display:flex;
  justify-content:space-between;
  margin-top:.8rem;
  font-size:.85rem;
}
.links a{
  color:var(--accent);
  text-decoration:none;
}

/* ────── DIVIDER ────── */
.divider{
  display:flex;
  align-items:center;
  gap:1rem;
  margin:1.4rem 0;
}
.divider span{
  flex:1;
  height:1px;
  background:rgba(255,255,1,.1);
}
.divider p{
  font-size:.8rem;
  color:var(--muted);
}

/* ────── SOCIAL BUTTONS ────── */
.social-row{
  display:flex;
  justify-content:center;
  gap:1rem;
  margin-top:.6rem;
}
.social-btn{
  width:46px;height:46px;
  border-radius:50%;
  border:none;
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,.3);
  transition:.2s;
}
.social-btn:hover{transform:scale(1.1);}
.social-btn img{
  width:24px;
  filter:drop-shadow(0 0 2px rgba(0,0,0,.4));
}

/* ────── FOOTER ────── */
.footer{
  margin-top:1.6rem;
  font-size:.85rem;
  color:var(--muted);
}
.footer a{color:var(--accent);}

/* ────── ANIMATIONS ────── */
@keyframes orbit{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* ────── LIGHT‑MODE INPUT BACKGROUND ────── */
html.light input{
  background:rgba(255,255,255,.4);
}
html.light input::placeholder{
  color:var(--muted);
}
</style>
</head>

<body>

<div class="card">

  <!-- DARK / LIGHT MODE TOGGLE -->
  <button class="mode-btn" onclick="toggleMode()">
    <i class="fa-solid fa-moon"></i>
  </button>

  <!-- ATOM LOGO -->
  <div class="atom-logo">
    <div class="nucleus"></div>
    <div class="orbit"><div class="dot"></div></div>
    <div class="orbit"><div class="dot"></div></div>
    <div class="orbit"><div class="dot"></div></div>
  </div>

  <div class="logo-text">AR SCIENCE</div>
  <div class="subtitle">Pasig Catholic College</div>

  <!-- ROLE SWITCH -->
  <div class="role-row">
    <button class="role-btn active" onclick="setRole(this)">Student</button>
    <button class="role-btn" onclick="setRole(this)">Teacher</button>
  </div>

  <!-- EMAIL / ID -->
  <div class="input-group">
    <i class="fa-solid fa-user fa"></i>
    <input id="email"
           type="text"
           placeholder="Student ID (e.g., 12-3456)"
           maxlength="7"
           autocomplete="off">
  </div>
  <div id="emailError" class="error">Student ID must be in the format ##‑####</div>

  <!-- PASSWORD -->
  <div class="input-group">
    <i class="fa-solid fa-lock fa"></i>
    <input id="password" type="password" placeholder="Password" maxlength="7">
    <i class="fa-regular fa-eye icon" onclick="togglePassword(this)"></i>
  </div>
  <div id="passError" class="error">Password must be exactly 7 characters</div>

  <!-- LOG IN -->
  <button class="login-btn" onclick="login()">LOG IN</button>

  <!-- HELP LINKS -->
  <div class="links"><a href="#" onclick="forgotPassword()">Forgot password?</a></div>

  <!-- OR DIVIDER (shown only for Teacher) -->
  <div class="divider"><span></span><p>OR</p><span></span></div>

  <!-- SOCIAL LOGINS -->
  <div class="social-row">
    <!-- Gmail (Google) – only for Teacher -->
    <button class="social-btn" id="googleBtn" onclick="socialLogin('Google')">
      <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google">
    </button>

    <!-- Microsoft – only for Teacher -->
    <button class="social-btn" id="msBtn" onclick="socialLogin('Microsoft')">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" alt="Microsoft">
    </button>
  </div>

  <div class="footer">
    AR Science Explorer System
  </div>
</div>

<script>
/* ────── GLOBAL STATE ────── */
let currentRole = 'student';   // default on page load

/* ────── ROLE SWITCH ────── */
function setRole(btn){
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentRole = btn.textContent.trim().toLowerCase(); // 'student' or 'teacher'

  const emailInput    = document.getElementById('email');
  const emailError    = document.getElementById('emailError');
  const passwordInput = document.getElementById('password');
  const passError     = document.getElementById('passError');
  const divider       = document.querySelector('.divider');

  if (currentRole === 'teacher'){
    // ---- Teacher ----
    emailInput.placeholder = 'Email (yourname@gmail.com)';
    emailError.textContent = 'Please use a @gmail.com address';
    emailInput.removeAttribute('maxlength');
    emailInput.removeAttribute('inputmode');

    // Teacher password: free‑will (no maxlength)
    passwordInput.removeAttribute('maxlength');
    passwordInput.placeholder = 'Password (min 6 characters)';

    // Show divider & social icons
    divider.style.display = 'flex';
    document.getElementById('googleBtn').style.display = 'flex';
    document.getElementById('msBtn').style.display    = 'flex';
  }else{
    // ---- Student ----
    emailInput.placeholder = 'Student ID (e.g., 12-3456)';
    emailError.textContent = 'Student ID must be in the format ##‑####';
    emailInput.setAttribute('maxlength','7');
    emailInput.setAttribute('inputmode','numeric');

    // Student password stays limited to 7 chars
    passwordInput.setAttribute('maxlength','7');
    passwordInput.placeholder = 'Password (7 characters)';

    // Hide divider & social icons
    divider.style.display = 'none';
    document.getElementById('googleBtn').style.display = 'none';
    document.getElementById('msBtn').style.display    = 'none';
  }

  // clear any visible errors
  emailError.style.display = 'none';
  passError.style.display   = 'none';
}

/* ────── SHOW / HIDE PASSWORD ────── */
function togglePassword(icon){
  const p = document.getElementById('password');
  const hidden = p.type === 'password';
  p.type = hidden ? 'text' : 'password';
  icon.classList.toggle('fa-eye',        !hidden);
  icon.classList.toggle('fa-eye-slash',  hidden);
}

/* ────── DARK / LIGHT MODE TOGGLE ────── */
function toggleMode(){
  const root = document.documentElement;
  const light = root.classList.toggle('light');
  const i = document.querySelector('.mode-btn i');
  i.classList.toggle('fa-moon', !light);
  i.classList.toggle('fa-sun',  light);
}

/* ────── REAL‑TIME VALIDATION FOR STUDENT ────── */
function attachRealtimeChecks(){
  const emailInput = document.getElementById('email');
  const passInput  = document.getElementById('password');
  const emailError = document.getElementById('emailError');
  const passError  = document.getElementById('passError');

  /* -------- Student ID (###‑###) -------- */
  emailInput.addEventListener('input', () => {
    if (currentRole === 'student'){
      const pattern = /^\d{3}-\d{3}$/;
      emailError.style.display = pattern.test(emailInput.value) ? 'none' : 'block';
    }
  });

  // Allow only digits & a single dash
  emailInput.addEventListener('keypress', e => {
    if (currentRole === 'student'){
      const char = String.fromCharCode(e.which);
      if (!/[0-9-]/.test(char)){
        e.preventDefault();
        return;
      }
      if (char === '-' && emailInput.value.includes('-')){
        e.preventDefault();
      }
    }
  });

  /* -------- Student password (exactly 7 chars) -------- */
  passInput.addEventListener('input', () => {
    if (currentRole === 'student'){
      passError.style.display = (passInput.value.length !== 7) ? 'block' : 'none';
    }
  });
}

/* Attach listeners once the DOM is ready */
window.addEventListener('DOMContentLoaded', attachRealtimeChecks);

/* ────── VALIDATION & REDIRECTION ────── */
function login(){
  const emailEl  = document.getElementById('email');
  const passEl   = document.getElementById('password');
  const emailErr = document.getElementById('emailError');
  const passErr  = document.getElementById('passError');

  // reset errors
  emailErr.style.display = 'none';
  passErr.style.display  = 'none';
  let valid = true;
  const emailVal = emailEl.value.trim();

  if (currentRole === 'teacher'){
    // ---- Teacher checks ----
    const gmailPattern = /^[^\s@]+@gmail\.com$/i;
    if (!gmailPattern.test(emailVal)){
      emailErr.textContent = 'Please use a @gmail.com address';
      emailErr.style.display = 'block';
      valid = false;
    }
    if (passEl.value.length < 6){
      passErr.style.display = 'block';
      valid = false;
    }
  }else{
    // ---- Student checks ----
    const studentPattern = /^\d{3}-\d{3}$/;
    if (!studentPattern.test(emailVal)){
      emailErr.textContent = 'Student ID must be in the format ###‑###';
      emailErr.style.display = 'block';
      valid = false;
    }
    if (passEl.value.length !== 7){
      passErr.textContent = 'Password must be exactly 7 characters';
      passErr.style.display = 'block';
      valid = false;
    }
  }

  if (valid){
    alert('Login Successful 🎉');
    // ─── REDIRECT BASED ON ROLE ───
    const target = (currentRole === 'teacher') ? 'teacher.html' : 'AR.HTML';
    setTimeout(()=>{ window.location.href = target; }, 300);
  }
}

/* ────── SOCIAL LOGIC ────── */
function socialLogin(platform){
  if (platform === 'Google'){
    window.open('https://mail.google.com', '_blank');
  }else if (platform === 'Microsoft'){
    window.open('https://www.microsoft.com', '_blank');
  }
}

/* ────── HELP LINKS ────── */
function forgotPassword(){ alert('Recovery link will be sent to your e‑mail.'); }
function signup(){ alert('Redirect to sign‑up page.'); }
</script>
</body>
</html>
