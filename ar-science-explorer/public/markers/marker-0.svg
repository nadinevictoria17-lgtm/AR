<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .border { fill: none; stroke: #00e5c8; stroke-width: 3; }
      .corner { fill: #00e5c8; }
      .text { font-family: Orbitron, monospace; font-size: 16px; fill: #00e5c8; text-anchor: middle; }
      .model-name { font-size: 24px; font-weight: bold; fill: #00e5c8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#0a0e27"/>

  <!-- Marker border -->
  <rect x="20" y="20" width="260" height="260" class="border" rx="5"/>

  <!-- Corner markers (registration marks) -->
  <circle cx="20" cy="20" r="8" class="corner"/>
  <circle cx="280" cy="20" r="8" class="corner"/>
  <circle cx="20" cy="280" r="8" class="corner"/>
  <circle cx="280" cy="280" r="8" class="corner"/>

  <!-- Center target pattern -->
  <circle cx="150" cy="150" r="80" class="border"/>
  <circle cx="150" cy="150" r="60" class="border"/>
  <circle cx="150" cy="150" r="40" class="border"/>
  <circle cx="150" cy="150" r="5" class="corner"/>

  <!-- Model name -->
  <text x="150" y="250" class="model-name">Atomic Structure</text>
  <text x="150" y="275" class="text">(Physics - Model 0)</text>

  <!-- Vuforia target indicator -->
  <text x="150" y="35" class="text" font-size="12">Vuforia Marker</text>
</svg>