<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Science Explorer - Camera View</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js for A-Frame (Barcode tracking) -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
    }

    a-scene {
      display: block !important;
    }

    canvas {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
    }

    #exit-btn:hover, #camera-toggle-btn:hover {
      background: rgba(0, 0, 0, 0.9);
      border-color: rgba(255, 255, 255, 0.5);
    }

    /* Info overlay */
    #overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.7), transparent);
      color: white;
      padding: 40px 24px 32px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 1000;
    }

    #overlay.visible {
      transform: translateY(0);
    }

    #overlay-title {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 8px;
      line-height: 1.2;
    }

    #overlay-desc {
      font-size: 13px;
      margin: 0;
      opacity: 0.85;
      line-height: 1.6;
      max-width: 600px;
    }

    /* Loading indicator */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 24px 32px;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      z-index: 5000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #loading.show {
      opacity: 1;
    }

    #loading::after {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-left: 8px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: -2px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div style="position: fixed; top: 16px; right: 16px; z-index: 9999; display: flex; gap: 8px;">
    <video id="video-fallback" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: -1;" playsinline autoplay></video>

  <button id="exit-btn" title="Exit AR mode" style="background: rgba(0, 0, 0, 0.7); color: white; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.2s ease;">✕ Exit AR</button>
    <button id="camera-toggle-btn" title="Switch camera" style="background: rgba(0, 0, 0, 0.7); color: white; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.2s ease;">📷 Front</button>
  </div>

  <div id="overlay">
    <h2 id="overlay-title"></h2>
    <p id="overlay-desc"></p>
  </div>

  <div id="loading" class="show">
    <div style="text-align: center; line-height: 1.6;">
      📷 Initializing camera...
      <div style="font-size: 11px; margin-top: 8px; opacity: 0.7;">Allow camera access if prompted</div>
    </div>
  </div>

  <div id="instruction-overlay" style="position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.6), transparent); color: white; padding: 60px 24px 40px; text-align: center; z-index: 999; pointer-events: none; opacity: 1; transition: opacity 0.3s ease;">
    <div style="font-size: 24px; font-weight: 800; margin-bottom: 12px;" id="instruction-title">Looking for Model</div>
    <div style="font-size: 14px; opacity: 0.85; margin-bottom: 20px;" id="instruction-text">Point your camera at the printed marker image</div>
    <div style="display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;">
      <span style="background: rgba(255, 255, 255, 0.2); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;">📷 Scanning</span>
      <span style="background: rgba(255, 255, 255, 0.2); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;" id="instruction-hint"></span>
    </div>
  </div>

  <a-scene
    id="arscene"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium; antialias: true; alpha: true"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; maxDetectionRate: 30; canvasWidth: 1280; canvasHeight: 960; cameraParametersUrl: 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBQNDAsLDBkSEw8UHRofHh0aHBwgJC4nICIsIxwcKDcpLDAxNDQ0Hyc5PTgyPC4zNDL/2wBDAQkJCQwLDBgNDRgyIRwhMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjIyMjL/wAARCAAIAAgDASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAv/xAAUEAEAAAAAAAAAAAAAAAAAAAAA/8VAFQEBAQAAAAAAAAAAAAAAAAAAAAX/xAAUEQEAAAAAAAAAAAAAAAAAAAAA/9oADAMBAAIRAxEAPwCdABmX/9k='"
  >
    <!-- NFT Marker -->
    <a-nft
      id="nft-marker"
      type="nft"
      url=""
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >
      <!-- 3D Model -->
      <a-entity
        id="model"
        gltf-model=""
        scale="0.1 0.1 0.1"
        position="0 0 0"
        rotation="-90 0 0"
        animation-mixer
      ></a-entity>
    </a-nft>

    <!-- Camera -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Parse query parameters
    const params = new URLSearchParams(location.search);
    const nftUrl = params.get('nft') || '';
    const glbUrl = params.get('glb') || '';
    const title = params.get('title') || '';
    const desc = params.get('desc') || '';
    let cameraMode = params.get('cam') || 'user'; // 'user' = front, 'environment' = rear

    // References
    const marker = document.getElementById('nft-marker');
    const model = document.getElementById('model');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayDesc = document.getElementById('overlay-desc');
    const exitBtn = document.getElementById('exit-btn');
    const cameraToggleBtn = document.getElementById('camera-toggle-btn');
    const loadingEl = document.getElementById('loading');
    const instructionOverlay = document.getElementById('instruction-overlay');
    const instructionTitle = document.getElementById('instruction-title');
    const instructionText = document.getElementById('instruction-text');
    const instructionHint = document.getElementById('instruction-hint');
    const videoFallback = document.getElementById('video-fallback');

    // Set title and description
    overlayTitle.textContent = title;
    overlayDesc.textContent = desc;

    // Set instruction overlay with lesson info
    instructionTitle.textContent = title || 'AR Model Scanning';
    instructionText.textContent = desc || 'Point your camera at the printed marker image';
    instructionHint.textContent = cameraMode === 'user' ? '🔄 Front Camera' : '🔄 Rear Camera';

    // Set AR.js marker URL
    if (nftUrl) {
      marker.setAttribute('url', nftUrl);
    }

    // Set GLB model path
    if (glbUrl) {
      model.setAttribute('gltf-model', glbUrl);
    }

    // Update camera toggle button text
    const updateCameraButtonText = () => {
      cameraToggleBtn.textContent = cameraMode === 'user' ? '📷 Switch to Rear' : '📷 Switch to Front';
    };
    updateCameraButtonText();

    // Camera toggle handler
    cameraToggleBtn.addEventListener('click', () => {
      cameraMode = cameraMode === 'user' ? 'environment' : 'user';
      updateCameraButtonText();
      instructionHint.textContent = cameraMode === 'user' ? '🔄 Front Camera' : '🔄 Rear Camera';
      // Reload with new camera mode
      const newParams = new URLSearchParams(location.search);
      newParams.set('cam', cameraMode);
      window.location.search = newParams.toString();
    });

    // Exit button handler
    exitBtn.addEventListener('click', () => {
      window.parent.postMessage({ type: 'ar-exit' }, '*');
    });

    // Marker events
    marker.addEventListener('markerFound', () => {
      loadingEl.classList.remove('show');
      instructionOverlay.style.opacity = '0';
      instructionOverlay.style.pointerEvents = 'none';
      overlay.classList.add('visible');
      window.parent.postMessage({ type: 'ar-marker-found' }, '*');
    });

    marker.addEventListener('markerLost', () => {
      instructionOverlay.style.opacity = '1';
      instructionOverlay.style.pointerEvents = 'none';
      overlay.classList.remove('visible');
    });

    // Error handling
    marker.addEventListener('error', (e) => {
      console.error('Marker error:', e);
      loadingEl.textContent = '📷 Camera ready - aim at marker image';
      loadingEl.classList.add('show');
    });

    // Camera permission denied handler
    window.addEventListener('error', (e) => {
      if (e.message && e.message.includes('Permission')) {
        loadingEl.textContent = '❌ Camera permission denied';
        loadingEl.style.opacity = '1';
        console.error('Camera permission error:', e);
      }
    });

    // Get camera stream directly for fallback display
    const startCameraStream = async () => {
      try {
        const constraints = {
          video: {
            facingMode: { ideal: cameraMode },
            width: { ideal: 1280 },
            height: { ideal: 960 }
          },
          audio: false
        };

        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        videoFallback.srcObject = stream;
        videoFallback.play();
        console.log('Camera stream started');
      } catch (err) {
        console.error('Camera error:', err.name, err.message);
        loadingEl.textContent = `❌ Camera Error: ${err.message}\n✓ Allow camera access in browser settings`;
        loadingEl.style.whiteSpace = 'pre-wrap';
        loadingEl.classList.add('show');
      }
    };

    // Start camera stream immediately
    startCameraStream();

    // Configure camera constraints based on cameraMode for AR.js
    navigator.mediaDevices.getUserMedia = (function(original) {
      return function(constraints) {
        if (!constraints) constraints = {};
        if (!constraints.video) constraints.video = true;

        // Only set facingMode if video is an object
        if (typeof constraints.video === 'object') {
          constraints.video.facingMode = { ideal: cameraMode };
        }

        console.log('Camera constraints:', constraints);
        return original.call(navigator.mediaDevices, constraints)
          .catch(err => {
            console.error('Camera error:', err.name, err.message);
            throw err;
          });
      };
    })(navigator.mediaDevices.getUserMedia);

    // Track when scene initializes
    const scene = document.getElementById('arscene');
    scene.addEventListener('loaded', () => {
      console.log('A-Frame scene loaded');
      // Give it more time to start video
      setTimeout(() => {
        if (loadingEl.classList.contains('show')) {
          loadingEl.innerHTML = '📷 Camera ready - aim at marker image';
        }
      }, 1000);
    });

    // Remove loading message after 8 seconds (marker may not be visible)
    setTimeout(() => {
      if (loadingEl.classList.contains('show')) {
        loadingEl.innerHTML = '📷 Camera ready - aim at marker image';
      }
    }, 8000);

    // Mouse interaction for model rotation and scaling
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
    let rotX = 0;
    let rotY = 0;
    let scale = 0.1;

    document.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;

      const deltaX = e.clientX - lastX;
      const deltaY = e.clientY - lastY;

      rotY += deltaX * 0.5;
      rotX -= deltaY * 0.5;

      lastX = e.clientX;
      lastY = e.clientY;

      // Update model rotation (offset by -90 for the default rotation)
      model.setAttribute('rotation', `${rotX - 90} ${rotY} 0`);
    });

    // Scroll wheel to zoom
    document.addEventListener('wheel', (e) => {
      e.preventDefault();

      const zoomSensitivity = 0.0002;
      scale = Math.max(0.02, Math.min(0.5, scale - e.deltaY * zoomSensitivity));
      model.setAttribute('scale', `${scale} ${scale} ${scale}`);
    }, { passive: false });
  </script>
</body>
</html>
